<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pets Cadastrados - PetShop</title>
    <link rel="stylesheet" href="../CSS/dashboard.css">
    <link rel="stylesheet" href="../CSS/tabelas.css">
    <script src="../pets.js" defer></script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <div class="logo">🐾 Mundo Pet</div>
        <div class="menu">
            <a href="dashboard.html" class="menu-item" style="text-decoration: none; color: inherit; display: block;">
                <i class="fa-solid fa-table-cells"></i> Dashboard
            </a>
            <a href="pets.html" class="menu-item active" style="text-decoration: none; color: inherit; display: block;">
                <i class="fa-solid fa-paw"></i> Pets
            </a>
            <div class="menu-item">
                <i class="fa-solid fa-calendar"></i> Agendamentos
            </div>
            <div class="menu-item">
                <i class="fa-solid fa-chart-column"></i> Relatórios
            </div>
            <div class="menu-item">
                <i class="fa-solid fa-gear"></i> Configurações
            </div>
        </div>
    </div>

    <div class="content">

        <div class="top">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Pesquisar pet, tutor ou serviço">
            </div>
            <div class="icons">
                <i class="fa-solid fa-bell"></i>
                <div class="profile">
                    👤 <span class="user-profile-name">Carregando...</span>
                </div>
            </div>
        </div>

        <div class="page-header">
            <h1>Pets Cadastrados</h1>
        </div>

        <div class="full-table-box">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tutor</th>
                        <th>E-mail</th>
                        <th>Pet</th>
                        <th>Tipo</th>
                        <th>Raça</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-pets-body">
                    <!-- preenchido pelo pets.js -->
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- Modal Editar -->
<div class="modal" id="modalEditar" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Editar Usuário</h2>
            <button id="fecharModalEditar"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form class="pet-form" id="formEditar">
            <input type="hidden" id="editId">

            <h3>Informações do Tutor</h3>
            <input type="text" id="editNome" placeholder="Nome do tutor" required>
            <input type="email" id="editEmail" placeholder="E-mail" required>

            <h3>Informações do Pet</h3>
            <input type="text" id="editNomePet" placeholder="Nome do pet" required>
            <input type="text" id="editEspecie" placeholder="Espécie" required>
            <input type="text" id="editRaca" placeholder="Raça" required>

            <button type="submit">Salvar alterações</button>
        </form>
    </div>
</div>

</body>
</html>
