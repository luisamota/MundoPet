<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/register.css">
    <script src="../JS/config.js"></script>
    <script src="../JS/validacao.js" defer></script>
    <script src="../JS/CONTROLLER/cadastro_usuario.js" defer></script>
    <script src="../JS/register.js" defer></script>
</head>

<body>

    <div class="login-card">
        <button class="close-btn">&times;</button>

        <h1>Cadastro</h1>

        <form id="frmCadastro">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label for="pet-name">Nome Pet</label>
                <input type="text" id="petName" required>
            </div>

            <div class="input-group">
                <label for="breed">Raça</label>
                <input type="text" id="breed" required>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirmar senha</label>
                <input type="password" id="confirm-password" required>
            </div>

            <button type="submit" id="btn-cadastrar" class="btn-login">Cadastrar</button>
        </form>

        <div class="signup-text">
            Já tem conta? <a href="#" id="link-login">Clique aqui</a>
        </div>
    </div>

</body>

</html>
